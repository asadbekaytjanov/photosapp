<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Gallery – PhotosApp</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📷</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gallery-page">
<header>
    <div>
        <h1>📷 PhotosApp V1.0</h1>
        <div class="greeting">Welcome, <span id="username">User</span></div>
    </div>
    <div class="nav">
        <form id="uploadForm">
            <input type="file" name="file" id="fileInput" style="display:none;" accept="image/*,video/*">
            <button type="button" onclick="document.getElementById('fileInput').click()">+ Upload</button>
        </form>
        <a href="#" id="logoutBtn">Logout</a>
    </div>
</header>

<div id="errorMessage" class="error-msg" style="display: none;"></div>
<div id="successMessage" class="delete-msg" style="display: none;"></div>

<div id="emptyState" class="empty" style="display: none;">
    <p>No photos or videos yet. Click <strong>+ Upload</strong> to start.</p>
</div>

<div id="gallery" class="gallery"></div>

<script src="js/gallery.js"></script>
</body>
</html>
