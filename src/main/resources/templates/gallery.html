<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Gallery – PhotosApp</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📷</text></svg>">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="gallery-page">
<header>
    <div>
        <h1>📷 PhotosApp V1.0</h1>
        <div class="greeting">Welcome, <span th:text="${username}">User</span></div>
    </div>
    <div class="nav">
        <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput" style="display:none;" accept="image/*,video/*">
            <button type="button" onclick="document.getElementById('fileInput').click()">+ Upload</button>
            <script>
                document.getElementById('fileInput').addEventListener('change', function() {
                    this.form.submit();
                });
            </script>
        </form>
        <a th:href="@{/logout}">Logout</a>
    </div>
</header>

<div th:if="${error}" class="error-msg" th:text="${error}"></div>
<div th:if="${deleteMSG}" class="delete-msg" th:text="${deleteMSG}"></div>

<div th:if="${mediaList == null or mediaList.isEmpty()}" class="empty">
    <p>No photos or videos yet. Click <strong>+ Upload</strong> to start.</p>
</div>

<div th:unless="${mediaList == null or mediaList.isEmpty()}" class="gallery">
    <div class="card" th:each="media : ${mediaList}">
        <img th:if="${#strings.startsWith(media.contentType, 'image/')}"
             th:src="@{/photos/{id}/open(id=${media.id})}"
             class="media-img"
             alt="photo"
             onclick="window.open(this.src, '_blank')"
             style="cursor: pointer;">
        <video th:if="${#strings.startsWith(media.contentType, 'video/')}"
               class="media-video" controls>
            <source th:src="@{/photos/{id}/open(id=${media.id})}">
        </video>
        <div class="card-body">
            <div class="filename" th:text="${media.fileName}">File name</div>
            <div class="card-actions">
                <a th:href="@{/photos/{id}/download(id=${media.id})}">Download</a>
                <a th:href="@{/photos/{id}/delete(id=${media.id})}" class="delete">Delete</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
